<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sift</title>
<style>
:root {
  /* Dark theme (default) */
  --bg: #0b0b0f;
  --bg-grad: radial-gradient(1200px 600px at 50% -200px, #1a1a28 0%, #0b0b0f 60%);
  --surface: #14141a;
  --surface-2: #1a1a22;
  --surface-hover: #1f1f28;
  --border: #25252e;
  --border-strong: #34343f;
  --text: #f2f2f5;
  --text-dim: #a1a1ac;
  --text-faint: #6b6b76;
  --accent: #6b8aff;
  --accent-hover: #8aa0ff;
  --accent-dim: #2a3458;
  --danger: #f25c5c;
  --danger-hover: #ff7575;
  --success: #4ade80;
  --warning: #fbbf24;
  --radius: 14px;
  --radius-sm: 9px;
  --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
  --bar-bg: rgba(20, 20, 26, 0.92);
  --scrollbar-thumb: #2c2c36;
  --scrollbar-thumb-hover: #3c3c48;
  --toggle-knob: #bbbbbb;
  color-scheme: dark;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f4f4f8;
    --bg-grad: radial-gradient(1200px 600px at 50% -200px, #eef0fa 0%, #f4f4f8 60%);
    --surface: #ffffff;
    --surface-2: #f4f5fa;
    --surface-hover: #eceff5;
    --border: #e3e4ec;
    --border-strong: #c8cad8;
    --text: #15151c;
    --text-dim: #585864;
    --text-faint: #8c8c98;
    --accent: #4d6df0;
    --accent-hover: #3955d8;
    --accent-dim: #dbe0fa;
    --danger: #dc2f33;
    --danger-hover: #b5232a;
    --success: #059669;
    --warning: #d97706;
    --shadow-lg: 0 10px 40px rgba(50, 50, 70, 0.10);
    --shadow-md: 0 4px 16px rgba(50, 50, 70, 0.07);
    --bar-bg: rgba(255, 255, 255, 0.90);
    --scrollbar-thumb: #c5c6d0;
    --scrollbar-thumb-hover: #a8a9b6;
    --toggle-knob: #ffffff;
    color-scheme: light;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  background-image: var(--bg-grad);
  color: var(--text);
  font-family: "Segoe UI Variable", "Segoe UI", -apple-system, BlinkMacSystemFont,
               system-ui, "Inter", Roboto, "Helvetica Neue", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  display: flex;
  flex-direction: column;
}

::selection { background: var(--accent-dim); color: var(--text); }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 5px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

/* Layout */
.app {
  width: 100%;
  max-width: 920px;
  margin: 0 auto;
  padding: 32px 28px 160px;
  flex: 1;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 28px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.brand-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, #6b8aff 0%, #b06bff 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 16px rgba(107, 138, 255, 0.3);
}
.brand h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.brand .sub {
  font-size: 12.5px;
  color: var(--text-dim);
}
.header-actions { display: flex; gap: 8px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .05s;
  font-family: inherit;
}
.btn:hover { background: var(--surface-hover); border-color: var(--border-strong); }
.btn:active { transform: translateY(1px); }
.btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  background: var(--surface);
}
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--surface); border-color: var(--border); }

.btn-primary {
  background: var(--accent);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 2px 12px rgba(107, 138, 255, 0.25);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled {
  background: var(--surface);
  color: var(--text-faint);
  box-shadow: none;
  border: 1px solid var(--border);
}

.btn-danger {
  background: var(--danger);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 2px 12px rgba(242, 92, 92, 0.25);
}
.btn-danger:hover { background: var(--danger-hover); }

.btn-big {
  padding: 14px 18px;
  font-size: 15px;
  font-weight: 600;
  border-radius: var(--radius);
  width: 100%;
  justify-content: center;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
}
.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
}

/* Folder chips */
.empty-line {
  color: var(--text-faint);
  font-size: 13px;
  font-style: italic;
  padding: 12px 4px;
}
.chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  margin-top: 6px;
  font-size: 13px;
  color: var(--text);
}
.chip-path {
  flex: 1;
  min-width: 0;
  font-family: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  word-break: break-all;
}
.chip-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.mode-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 6px;
  padding: 4px 7px;
  font-size: 11.5px;
  cursor: pointer;
  font-family: inherit;
}
.mode-btn:hover { background: var(--surface-hover); color: var(--text); }
.mode-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--text);
}
.mode-btn.protected.active {
  background: rgba(74, 222, 128, 0.13);
  border-color: rgba(74, 222, 128, 0.35);
  color: var(--success);
}
.mode-btn.excluded.active {
  background: rgba(251, 191, 36, 0.12);
  border-color: rgba(251, 191, 36, 0.35);
  color: var(--warning);
}
.chip-x {
  background: transparent;
  border: none;
  color: var(--text-faint);
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 4px;
  font-size: 16px;
  line-height: 1;
}
.chip-x:hover { background: var(--surface-hover); color: var(--danger); }

/* Inputs */
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label {
  font-size: 11.5px;
  color: var(--text-dim);
  font-weight: 500;
}
.field input,
.field select {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
.field input:focus,
.field select:focus { border-color: var(--accent); }

/* Scan status */
.status-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
}
.status-copy {
  flex: 1;
  min-width: 0;
}
.status-detail {
  margin-top: 2px;
  font-size: 11.5px;
  color: var(--text-dim);
}
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Results hero */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 22px 22px;
}
.hero-left .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.hero-left .big {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-top: 2px;
  line-height: 1.1;
}
.hero-left .sub { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
.hero-right { display: flex; gap: 8px; align-items: center; }
.hero-right select { padding: 8px 28px 8px 12px; }

.filters-grid {
  display: grid;
  grid-template-columns: 1.5fr 0.8fr 0.9fr 1fr auto;
  gap: 10px;
  align-items: end;
}
.profiles-grid {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px;
  align-items: end;
  margin-bottom: 14px;
}
.result-count {
  margin-top: 10px;
  font-size: 12.5px;
  color: var(--text-dim);
}

/* Empty result state */
.empty-state {
  text-align: center;
  padding: 56px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.empty-state p { color: var(--text-dim); font-size: 13.5px; }

/* Group card */
.group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}
.group-head {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid transparent;
  transition: background .15s, border-color .15s;
}
.group-head:hover { background: var(--surface-hover); }
.group.open .group-head { border-color: var(--border); }
.group-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
}
.group-meta { color: var(--text-dim); font-size: 12.5px; }
.chev {
  width: 18px; height: 18px;
  color: var(--text-faint);
  transition: transform .2s;
}
.group.open .chev { transform: rotate(90deg); }
.group-body {
  display: none;
}
.group.open .group-body { display: block; }
.anchor-hint {
  padding: 8px 18px;
  font-size: 11.5px;
  color: var(--text-faint);
  font-family: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}

/* File row */
.file {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 18px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.file:first-child { border-top: none; }
.file:hover { background: var(--surface-hover); }
.file-status {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.file.keep .file-status {
  background: rgba(74, 222, 128, 0.13);
  color: var(--success);
  border: 1px solid rgba(74, 222, 128, 0.3);
}
.file.delete .file-status {
  background: rgba(242, 92, 92, 0.12);
  color: var(--danger);
  border: 1px solid rgba(242, 92, 92, 0.25);
}
.file.protected .file-status {
  background: rgba(74, 222, 128, 0.13);
  color: var(--success);
  border: 1px solid rgba(74, 222, 128, 0.32);
}
.file-info { flex: 1; min-width: 0; }
.file-name {
  font-size: 13px;
  font-family: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  word-break: break-all;
  color: var(--text);
}
.file.delete .file-name { color: var(--text-dim); }
.file-meta {
  font-size: 11.5px;
  color: var(--text-faint);
  margin-top: 2px;
}

/* Sticky action bar */
.bar {
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  width: calc(100% - 56px);
  max-width: 920px;
  background: var(--bar-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  box-shadow: var(--shadow-lg);
  z-index: 20;
}
.bar-left .lbl { font-size: 11.5px; color: var(--text-dim); }
.bar-left .val { font-size: 16px; font-weight: 600; margin-top: 2px; }
.bar-right { display: flex; align-items: center; gap: 12px; }

.toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}
.toggle input { display: none; }
.toggle .knob {
  width: 30px; height: 17px;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  border-radius: 99px;
  position: relative;
  transition: background .15s, border-color .15s;
}
.toggle .knob::after {
  content: "";
  position: absolute;
  top: 1px; left: 1px;
  width: 13px; height: 13px;
  background: var(--toggle-knob);
  border-radius: 50%;
  transition: left .15s, background .15s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.toggle input:checked + .knob {
  background: rgba(242, 92, 92, 0.25);
  border-color: var(--danger);
}
.toggle input:checked + .knob::after {
  left: 14px;
  background: var(--danger);
}

/* Toasts */
.toasts {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 30;
  pointer-events: none;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-left: 3px solid var(--accent);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  box-shadow: var(--shadow-md);
  animation: slide-up .25s ease-out;
  pointer-events: auto;
  max-width: 480px;
}
.toast.success { border-left-color: var(--success); }
.toast.error { border-left-color: var(--danger); }
.toast.warning { border-left-color: var(--warning); }
@keyframes slide-up {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Modal */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 40;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 480px;
  width: 90%;
  box-shadow: var(--shadow-lg);
}
.modal.wide { max-width: 720px; }
.modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.modal p { color: var(--text-dim); font-size: 13.5px; margin-bottom: 8px; }
.history-list {
  max-height: 420px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-top: 14px;
}
.history-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
  border-top: 1px solid var(--border);
}
.history-row:first-child { border-top: none; }
.history-main { min-width: 0; }
.history-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.history-meta {
  margin-top: 2px;
  font-size: 11.5px;
  color: var(--text-dim);
  font-family: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  word-break: break-all;
}
.history-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.preview-img {
  max-width: 100%;
  max-height: 460px;
  object-fit: contain;
  display: block;
  margin: 14px auto 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
}
.preview-text {
  margin-top: 14px;
  max-height: 420px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 12.5px;
  font-family: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
}
.preview-meta {
  margin-top: 14px;
  display: grid;
  gap: 8px;
  font-size: 13px;
}
.preview-meta div {
  padding: 8px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  word-break: break-all;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}

/* Fade-in for sections */
.fade-in { animation: fade .25s ease-out; }
@keyframes fade {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.hidden { display: none !important; }

/* Empty folder rows */
.efolder {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.efolder:first-of-type { border-top: none; }
.efolder:hover { background: var(--surface-hover); }
.efolder input[type=checkbox] {
  appearance: none;
  width: 17px; height: 17px;
  border-radius: 4px;
  border: 1.5px solid var(--border-strong);
  background: var(--surface-2);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: border-color .15s, background .15s;
}
.efolder input[type=checkbox]:checked {
  background: var(--accent);
  border-color: var(--accent);
}
.efolder input[type=checkbox]:checked::after {
  content: "";
  position: absolute;
  left: 4px; top: 1px;
  width: 5px; height: 9px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.efolder-path {
  font-size: 13px;
  font-family: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  word-break: break-all;
  flex: 1;
  color: var(--text);
}
.efolder.unselected .efolder-path { color: var(--text-dim); }
.efolder-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
}
.efolder-foot .meta {
  font-size: 12.5px;
  color: var(--text-dim);
}

/* Similar-photos grid */
.sim-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  overflow: hidden;
}
.sim-group-head {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.sim-group-head .meta { color: var(--text-dim); font-size: 12.5px; }
.sim-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 14px 18px;
}
.sim-tile {
  position: relative;
  background: var(--surface-2);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  overflow: hidden;
  transition: border-color .15s, transform .05s, box-shadow .15s;
}
.sim-tile:hover { transform: translateY(-1px); }
.sim-tile.keep {
  border-color: var(--success);
  box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.3);
}
.sim-tile.delete {
  border-color: var(--danger);
  opacity: 0.85;
}
.sim-tile img {
  display: block;
  width: 100%;
  height: 140px;
  object-fit: cover;
  background: #000;
}
.sim-tile-label {
  position: absolute;
  top: 6px; left: 6px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.sim-tile.keep .sim-tile-label { background: var(--success); color: #001a08; }
.sim-tile.delete .sim-tile-label { background: var(--danger); }
.sim-tile-meta {
  padding: 6px 8px 8px;
  font-size: 11px;
  color: var(--text-dim);
  font-family: "Cascadia Code", Consolas, monospace;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.sim-tile-meta .name {
  color: var(--text);
  word-break: break-all;
  font-size: 11.5px;
}
.sim-tile-actions {
  position: absolute;
  top: 4px; right: 4px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity .15s;
}
.sim-tile:hover .sim-tile-actions { opacity: 1; }
.sim-tile-actions button {
  background: rgba(0,0,0,0.7);
  border: none;
  color: white;
  width: 24px; height: 24px;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.sim-tile-actions button:hover { background: var(--accent); }
.sim-tile-actions svg { width: 12px; height: 12px; }
.sim-group-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
}
.sim-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  font-size: 13px;
}
.sim-controls label { color: var(--text-dim); font-size: 12.5px; }
.sim-controls input[type="range"] { flex: 1; max-width: 260px; }

/* Row icon buttons */
.open-btn,
.preview-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-faint);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, border-color .15s, color .15s;
  flex-shrink: 0;
  padding: 0;
}
.open-btn svg,
.preview-btn svg { width: 14px; height: 14px; }
.file:hover .open-btn,
.file:hover .preview-btn,
.efolder:hover .open-btn { color: var(--text-dim); }
.open-btn:hover,
.preview-btn:hover {
  background: var(--surface-2);
  border-color: var(--border-strong);
  color: var(--accent);
}

@media (max-width: 720px) {
  .filters-grid { grid-template-columns: 1fr; }
  .profiles-grid { grid-template-columns: 1fr; }
}

.icon { width: 16px; height: 16px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <div class="brand-icon" style="font-family:'Segoe UI Variable','Segoe UI',sans-serif;font-weight:700;letter-spacing:-0.02em;">S</div>
      <div>
        <h1>Sift</h1>
        <div class="sub">Find duplicates, similar photos, and what's eating your disk.</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn ghost" onclick="openHistory()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 2 4-6"/></svg>
        History
      </button>
      <button class="btn ghost" onclick="openRestore()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
        Restore
      </button>
    </div>
  </header>

  <!-- Folders card -->
  <section class="card">
    <div class="card-head">
      <div class="card-title">Folders to scan</div>
      <button class="btn" onclick="addFolder()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Add folder
      </button>
    </div>
    <div id="folders-list">
      <div class="empty-line">No folders yet — add one to get started.</div>
    </div>
  </section>

  <!-- Options card -->
  <section class="card">
    <div class="card-head">
      <div class="card-title">Options</div>
    </div>
    <div class="profiles-grid">
      <div class="field">
        <label>Profile</label>
        <select id="profile-select" onchange="loadSelectedProfile(this.value)">
          <option value="">Unsaved setup</option>
        </select>
      </div>
      <button class="btn" onclick="saveCurrentProfile()">Save</button>
      <button class="btn" onclick="deleteSelectedProfile()">Delete</button>
    </div>
    <div class="row">
      <div class="field">
        <label>Minimum file size (bytes)</label>
        <input id="min-size" type="number" min="0" value="1" />
      </div>
      <div class="field">
        <label>Skip patterns (comma separated)</label>
        <input id="skip" type="text" placeholder="*.tmp, logs, *.cache" />
      </div>
      <div class="field">
        <label>Default keeper</label>
        <select id="default-policy" onchange="state.defaultPolicy = this.value">
          <option value="keep-newest">Keep newest</option>
          <option value="keep-oldest">Keep oldest</option>
          <option value="keep-shortest">Keep shortest path</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Scan buttons -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <button id="scan-btn" class="btn btn-primary btn-big" onclick="startScan()">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      Scan for duplicates
    </button>
    <button id="similar-btn" class="btn btn-primary btn-big" onclick="startScanSimilar()" style="background:linear-gradient(135deg, #b06bff 0%, #6b8aff 100%);">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Find similar photos
    </button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;">
    <button id="empty-btn" class="btn btn-big" onclick="startScanEmpty()" style="background:var(--surface);border:1px solid var(--border);">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v13a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-8L9 5H4a1 1 0 0 0-1 1z"/></svg>
      Find empty folders
    </button>
    <button id="largest-btn" class="btn btn-big" onclick="startScanLargest()" style="background:var(--surface);border:1px solid var(--border);">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M6 21V10"/><path d="M12 21V4"/><path d="M18 21v-7"/></svg>
      Find largest items
    </button>
  </div>

  <!-- Scan status -->
  <div id="status" class="card status-card hidden" style="margin-top:14px;">
    <div class="spinner"></div>
    <div class="status-copy">
      <div id="status-text">Scanning...</div>
      <div id="status-detail" class="status-detail"></div>
    </div>
    <button id="cancel-btn" class="btn" style="margin-left:auto;" onclick="cancelScan()">Cancel</button>
  </div>

  <!-- Empty folders results -->
  <div id="empty-results" class="hidden" style="margin-top:14px;"></div>

  <!-- Largest items results -->
  <div id="largest-results" class="hidden" style="margin-top:14px;"></div>

  <!-- Similar photos results -->
  <div id="similar-results" class="hidden" style="margin-top:14px;"></div>

  <!-- Duplicates results -->
  <div id="results" class="hidden" style="margin-top:14px;"></div>

</div>

<!-- Sticky bottom action bar -->
<div id="action-bar" class="bar hidden">
  <div class="bar-left">
    <div class="lbl">Will <span id="action-verb">quarantine</span></div>
    <div class="val"><span id="will-count">0</span> files · <span id="will-free">0 B</span></div>
  </div>
  <div class="bar-right">
    <label class="toggle" title="Skip the quarantine safety net — files are gone immediately">
      <input id="permanent" type="checkbox" onchange="onPermanentToggle()" />
      <span class="knob"></span>
      Permanent
    </label>
    <button id="execute-btn" class="btn btn-primary" onclick="execute()">Move to quarantine</button>
  </div>
</div>

<!-- Toasts -->
<div id="toasts" class="toasts"></div>

<!-- Confirm modal mounted dynamically -->
<div id="modal-root"></div>

<script>
"use strict";

const PROFILE_STORAGE_KEY = "dupfinder.profiles.v1";
const DEFAULT_RESULT_FILTER = {
  query: "",
  ext: "",
  minSize: "",
  sort: "wasted-desc",
};

// ============================================================================
// State
// ============================================================================
const state = {
  folders: [], // [{path, mode: "normal" | "protected" | "excluded"}]
  groups: [],   // [{size, wasted, anchor, files: [{path, short, name, mtime, mtime_ts}], keepIndex}]
  scanning: false,
  totalWasted: 0,
  totalRecoverable: 0,
  totalGroups: 0,
  cacheEnabled: true,
  cacheHits: 0,
  cacheMisses: 0,
  defaultPolicy: "keep-newest",
  resultFilter: {...DEFAULT_RESULT_FILTER},
  profiles: [],
  activeProfileName: "",
  emptyFolders: [], // [{path, selected}]
  largestFiles: [], // [{path, short, size, size_label, mtime, mtime_ts, selected}]
  largestFolders: [], // [{path, short, total_size, total_size_label, direct_size, file_count}]
  largestTotalFiles: 0,
  largestTotalBytes: 0,
  similarGroups: [],    // [{files: [{path, short, size, size_label, mtime, mtime_ts, width, height, resolution, thumbnail, keep: bool}], wasted, wasted_label}]
  similarThreshold: 5,
  similarScanned: 0,
  similarSkipped: 0,
  pillowAvailable: true,
};

// ============================================================================
// Utilities
// ============================================================================
function formatSize(n) {
  const units = ["B", "KB", "MB", "GB", "TB"];
  let v = n, i = 0;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return i === 0 ? `${n} B` : `${v.toFixed(2)} ${units[i]}`;
}

function toast(msg, kind = "info", timeout = 4500) {
  const el = document.createElement("div");
  el.className = `toast ${kind}`;
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => {
    el.style.transition = "opacity .25s, transform .25s";
    el.style.opacity = "0";
    el.style.transform = "translateY(6px)";
    setTimeout(() => el.remove(), 250);
  }, timeout);
}

async function api(path, body = null) {
  let response;
  try {
    response = await fetch(path, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: body ? JSON.stringify(body) : "{}",
    });
  } catch (e) {
    throw {error: `Network error: ${e.message || e}`};
  }
  const text = await response.text();
  let parsed = null;
  if (text) {
    try { parsed = JSON.parse(text); }
    catch (e) {
      throw {error: response.ok
        ? `Bad JSON from server: ${text.slice(0, 200)}`
        : `HTTP ${response.status} ${response.statusText}: ${text.slice(0, 200)}`};
    }
  }
  if (!response.ok) {
    if (parsed && typeof parsed === "object" && parsed.error) throw parsed;
    throw {error: `HTTP ${response.status}: ${text.slice(0, 200) || response.statusText}`};
  }
  return parsed || {};
}

function confirmModal({title, body, confirmText = "Confirm", danger = false}) {
  return new Promise(resolve => {
    const root = document.getElementById("modal-root");
    root.innerHTML = `
      <div class="modal-bg">
        <div class="modal">
          <h3>${title}</h3>
          <p>${body}</p>
          <div class="modal-actions">
            <button class="btn ghost" id="m-cancel">Cancel</button>
            <button class="btn ${danger ? "btn-danger" : "btn-primary"}" id="m-ok">${confirmText}</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById("m-cancel").onclick = () => { root.innerHTML = ""; resolve(false); };
    document.getElementById("m-ok").onclick = () => { root.innerHTML = ""; resolve(true); };
  });
}

function inputModal({title, label, value = "", confirmText = "Save"}) {
  return new Promise(resolve => {
    const root = document.getElementById("modal-root");
    root.innerHTML = `
      <div class="modal-bg">
        <div class="modal">
          <h3>${title}</h3>
          <div class="field">
            <label>${label}</label>
            <input id="m-input" type="text" value="${escapeHtml(value)}" />
          </div>
          <div class="modal-actions">
            <button class="btn ghost" id="m-cancel">Cancel</button>
            <button class="btn btn-primary" id="m-ok">${confirmText}</button>
          </div>
        </div>
      </div>
    `;
    const input = document.getElementById("m-input");
    input.focus();
    input.select();
    const finish = (ok) => {
      const out = ok ? input.value.trim() : null;
      root.innerHTML = "";
      resolve(out);
    };
    document.getElementById("m-cancel").onclick = () => finish(false);
    document.getElementById("m-ok").onclick = () => finish(true);
    input.onkeydown = (e) => {
      if (e.key === "Enter") finish(true);
      if (e.key === "Escape") finish(false);
    };
  });
}

function activeFolders() {
  return state.folders.filter(f => f.mode !== "excluded");
}

function normalFolders() {
  return state.folders.filter(f => f.mode === "normal");
}

function protectedPaths() {
  return state.folders.filter(f => f.mode === "protected").map(f => f.path);
}

function preferredKeepIndex(group) {
  const protectedIndex = group.files.findIndex(f => f.protected);
  return protectedIndex >= 0 ? protectedIndex : (group.keep_index || 0);
}

function selectedDeletionsIn(group) {
  return group.files
    .map((file, i) => ({file, i}))
    .filter(({file, i}) => i !== group.keepIndex && !file.protected);
}

function normalizeExt(value) {
  return value.trim().toLowerCase().replace(/^\./, "");
}

function groupMatchesFilter(group) {
  const filter = state.resultFilter;
  const query = filter.query.trim().toLowerCase();
  const ext = normalizeExt(filter.ext);
  const minSize = Number(filter.minSize) || 0;

  if (minSize > 0 && group.size < minSize) return false;
  if (query) {
    const haystack = group.files.map(f => `${f.path} ${f.short} ${f.name}`).join(" ").toLowerCase();
    if (!haystack.includes(query)) return false;
  }
  if (ext) {
    const wanted = `.${ext}`;
    if (!group.files.some(f => f.name.toLowerCase().endsWith(wanted))) return false;
  }
  return true;
}

function visibleGroups() {
  const rows = state.groups
    .map((group, index) => ({group, index}))
    .filter(({group}) => groupMatchesFilter(group));
  const sort = state.resultFilter.sort;
  rows.sort((a, b) => {
    if (sort === "size-desc") return b.group.size - a.group.size;
    if (sort === "count-desc") return b.group.files.length - a.group.files.length;
    if (sort === "path-asc") {
      const ap = (a.group.anchor || a.group.files[0]?.path || "").toLowerCase();
      const bp = (b.group.anchor || b.group.files[0]?.path || "").toLowerCase();
      return ap.localeCompare(bp);
    }
    return b.group.wasted - a.group.wasted;
  });
  return rows;
}

function visibleDeletionSummary() {
  let count = 0, bytes = 0;
  for (const {group} of visibleGroups()) {
    const deletions = selectedDeletionsIn(group);
    count += deletions.length;
    bytes += deletions.length * group.size;
  }
  return {count, bytes};
}

function cleanFolderEntry(entry) {
  if (typeof entry === "string") return {path: entry, mode: "normal"};
  if (!entry || typeof entry.path !== "string") return null;
  const mode = ["normal", "protected", "excluded"].includes(entry.mode)
    ? entry.mode
    : "normal";
  return {path: entry.path, mode};
}

function cleanProfile(profile) {
  if (!profile || typeof profile.name !== "string" || !profile.name.trim()) {
    return null;
  }
  const folders = Array.isArray(profile.folders)
    ? profile.folders.map(cleanFolderEntry).filter(Boolean)
    : [];
  return {
    name: profile.name.trim(),
    folders,
    minSize: String(profile.minSize ?? "1"),
    skip: String(profile.skip ?? ""),
    defaultPolicy: ["keep-newest", "keep-oldest", "keep-shortest"].includes(profile.defaultPolicy)
      ? profile.defaultPolicy
      : "keep-newest",
    resultFilter: {
      ...DEFAULT_RESULT_FILTER,
      ...(profile.resultFilter || {}),
    },
    savedAt: profile.savedAt || "",
  };
}

function readProfiles() {
  try {
    const raw = localStorage.getItem(PROFILE_STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.map(cleanProfile).filter(Boolean)
      .sort((a, b) => a.name.localeCompare(b.name));
  } catch {
    return [];
  }
}

function writeProfiles(profiles) {
  localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profiles));
}

function renderProfileSelect() {
  const select = document.getElementById("profile-select");
  if (!select) return;
  select.innerHTML = `<option value="">Unsaved setup</option>` + state.profiles.map(profile => `
    <option value="${escapeHtml(profile.name)}" ${profile.name === state.activeProfileName ? "selected" : ""}>${escapeHtml(profile.name)}</option>
  `).join("");
}

function currentProfileSnapshot(name) {
  const policyEl = document.getElementById("policy");
  const defaultPolicyEl = document.getElementById("default-policy");
  return {
    name,
    folders: state.folders.map(f => ({path: f.path, mode: f.mode})),
    minSize: document.getElementById("min-size")?.value || "1",
    skip: document.getElementById("skip")?.value || "",
    defaultPolicy: policyEl?.value || defaultPolicyEl?.value || state.defaultPolicy,
    resultFilter: {...state.resultFilter},
    savedAt: new Date().toISOString(),
  };
}

function clearDuplicateResults() {
  state.groups = [];
  state.totalWasted = 0;
  state.totalRecoverable = 0;
  state.totalGroups = 0;
  const results = document.getElementById("results");
  if (results) {
    results.innerHTML = "";
    results.classList.add("hidden");
  }
  document.getElementById("action-bar").classList.add("hidden");
}

function applyProfile(profile) {
  state.folders = profile.folders.map(f => ({path: f.path, mode: f.mode}));
  state.defaultPolicy = profile.defaultPolicy;
  state.resultFilter = {...DEFAULT_RESULT_FILTER, ...profile.resultFilter};
  document.getElementById("min-size").value = profile.minSize;
  document.getElementById("skip").value = profile.skip;
  document.getElementById("default-policy").value = profile.defaultPolicy;
  renderFolders();
  clearDuplicateResults();
}

function loadSelectedProfile(name) {
  state.activeProfileName = name;
  renderProfileSelect();
  if (!name) return;
  const profile = state.profiles.find(p => p.name === name);
  if (!profile) return;
  applyProfile(profile);
  toast(`Loaded profile: ${name}`, "success", 2500);
}

async function saveCurrentProfile() {
  const existingName = state.activeProfileName || "";
  const name = await inputModal({
    title: "Save Profile",
    label: "Profile name",
    value: existingName,
    confirmText: "Save",
  });
  if (!name) return;
  const profile = currentProfileSnapshot(name);
  const without = state.profiles.filter(p => p.name !== name);
  state.profiles = [...without, profile].sort((a, b) => a.name.localeCompare(b.name));
  try {
    writeProfiles(state.profiles);
  } catch {
    toast("Could not save profile.", "error");
    return;
  }
  state.activeProfileName = name;
  renderProfileSelect();
  toast(`Saved profile: ${name}`, "success", 2500);
}

async function deleteSelectedProfile() {
  const name = state.activeProfileName || document.getElementById("profile-select")?.value || "";
  if (!name) {
    toast("No saved profile selected.", "warning");
    return;
  }
  const ok = await confirmModal({
    title: "Delete profile?",
    body: `Delete <code>${escapeHtml(name)}</code> from this browser?`,
    confirmText: "Delete",
    danger: true,
  });
  if (!ok) return;
  state.profiles = state.profiles.filter(p => p.name !== name);
  try {
    writeProfiles(state.profiles);
  } catch {
    toast("Could not update saved profiles.", "error");
    return;
  }
  state.activeProfileName = "";
  renderProfileSelect();
  toast(`Deleted profile: ${name}`, "success", 2500);
}

// ============================================================================
// Folders
// ============================================================================
async function addFolder() {
  let r;
  try { r = await api("/api/browse_folder"); }
  catch (e) { toast("Could not open folder picker.", "error"); return; }
  if (!r.path) return;
  if (state.folders.some(f => f.path === r.path)) {
    toast("Folder already added.", "warning");
    return;
  }
  state.folders.push({path: r.path, mode: "normal"});
  renderFolders();
}

function removeFolder(idx) {
  state.folders.splice(idx, 1);
  renderFolders();
}

function setFolderMode(idx, mode) {
  if (!state.folders[idx]) return;
  state.folders[idx].mode = mode;
  renderFolders();
}

function renderFolders() {
  const wrap = document.getElementById("folders-list");
  if (!state.folders.length) {
    wrap.innerHTML = `<div class="empty-line">No folders yet — add one to get started.</div>`;
    return;
  }
  wrap.innerHTML = state.folders.map((f, i) => `
    <div class="chip">
      <span class="chip-path">${escapeHtml(f.path)}</span>
      <div class="chip-controls">
        <button class="mode-btn ${f.mode === "normal" ? "active" : ""}" onclick="setFolderMode(${i}, 'normal')" title="Scan and allow cleanup">Normal</button>
        <button class="mode-btn protected ${f.mode === "protected" ? "active" : ""}" onclick="setFolderMode(${i}, 'protected')" title="Scan, but never delete files here">Protected</button>
        <button class="mode-btn excluded ${f.mode === "excluded" ? "active" : ""}" onclick="setFolderMode(${i}, 'excluded')" title="Do not scan this folder">Excluded</button>
        <button class="chip-x" title="Remove" onclick="removeFolder(${i})">×</button>
      </div>
    </div>
  `).join("");
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

async function openLocation(path) {
  try {
    await api("/api/open_location", {path});
  } catch (err) {
    toast("Could not open: " + (err.error || JSON.stringify(err)), "error");
  }
}

async function cancelScan() {
  const btn = document.getElementById("cancel-btn");
  if (btn) {
    btn.disabled = true;
    btn.textContent = "Cancelling...";
  }
  const t = document.getElementById("status-text");
  if (t) t.textContent = "Cancelling — waiting for current step to finish...";
  try {
    await api("/api/cancel_scan");
  } catch (err) {
    toast("Cancel failed: " + (err.error || JSON.stringify(err)), "error");
  }
}

function resetCancelBtn() {
  const btn = document.getElementById("cancel-btn");
  if (btn) {
    btn.disabled = false;
    btn.textContent = "Cancel";
  }
}

function setScanStatus(text, detail = "") {
  const main = document.getElementById("status-text");
  const sub = document.getElementById("status-detail");
  if (main) main.textContent = text;
  if (sub) sub.textContent = detail;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function updateScanProgress(job) {
  const main = job.message || "Scanning...";
  const bits = [];
  if (job.candidate_files) bits.push(`${job.candidate_files} candidates`);
  if (job.size_groups) bits.push(`${job.size_groups} size groups`);
  if (job.hashed_files) {
    const phase = job.hash_phase ? `${job.hash_phase} hash` : "hash";
    bits.push(`${job.hashed_files} ${phase} reads`);
  }
  if (job.cache_enabled && (job.cache_hits || job.cache_misses)) {
    bits.push(`${job.cache_hits || 0} cache hits`);
  }
  setScanStatus(main, bits.join(" · "));
}

async function waitForScan(jobId) {
  while (state.scanning) {
    const job = await api("/api/scan_status", {job_id: jobId});
    updateScanProgress(job);
    if (job.status === "done") return job.result || {};
    if (job.status === "cancelled") return {cancelled: true};
    if (job.status === "error") {
      throw new Error(job.error || job.message || "scan failed");
    }
    await sleep(450);
  }
  return {cancelled: true};
}

// Single delegated handler so dynamically-rendered .open-btn elements
// don't need inline JS (which would require escaping backslashes/quotes in paths).
document.addEventListener("click", (e) => {
  const restoreBtn = e.target.closest(".history-restore-btn");
  if (restoreBtn) {
    e.stopPropagation();
    e.preventDefault();
    const manifest = restoreBtn.dataset.manifest;
    if (manifest) restoreManifest(manifest);
    return;
  }

  const previewBtn = e.target.closest(".preview-btn");
  if (previewBtn) {
    e.stopPropagation();
    e.preventDefault();
    const p = previewBtn.dataset.path;
    if (p) openPreview(p);
    return;
  }

  const previewOpenBtn = e.target.closest(".preview-open-location");
  if (previewOpenBtn) {
    e.stopPropagation();
    e.preventDefault();
    const p = previewOpenBtn.dataset.path;
    if (p) openLocation(p);
    return;
  }

  const btn = e.target.closest(".open-btn");
  if (!btn) return;
  e.stopPropagation();
  e.preventDefault();
  const p = btn.dataset.path;
  if (p) openLocation(p);
});

// ============================================================================
// Scan
// ============================================================================
async function startScan() {
  const scanFolders = activeFolders();
  if (!scanFolders.length) {
    toast("Add or enable at least one folder first.", "warning");
    return;
  }
  if (state.scanning) return;
  state.scanning = true;

  const minSize = Number(document.getElementById("min-size").value) || 1;
  const skipRaw = document.getElementById("skip").value || "";
  const skip = skipRaw.split(",").map(s => s.trim()).filter(Boolean);

  document.getElementById("scan-btn").disabled = true;
  document.getElementById("empty-btn").disabled = true;
  resetCancelBtn();
  document.getElementById("status").classList.remove("hidden");
  document.getElementById("results").classList.add("hidden");
  document.getElementById("action-bar").classList.add("hidden");
  setScanStatus("Starting scan...", "");

  try {
    const job = await api("/api/scan_start", {
      paths: scanFolders.map(f => f.path),
      protected_paths: protectedPaths(),
      min_size: minSize,
      skip,
      hash_cache: true,
    });
    updateScanProgress(job);
    const data = await waitForScan(job.job_id);
    if (data.cancelled) {
      toast("Scan cancelled.", "warning", 3000);
    } else {
      state.groups = (data.groups || []).map(g => ({...g, keepIndex: preferredKeepIndex(g)}));
      state.totalWasted = data.total_wasted || 0;
      state.totalRecoverable = data.total_recoverable || 0;
      state.totalGroups = data.total_groups || 0;
      state.cacheEnabled = !!data.cache_enabled;
      state.cacheHits = data.cache_hits || 0;
      state.cacheMisses = data.cache_misses || 0;
      renderResults();
    }
  } catch (err) {
    toast("Scan failed: " + (err.error || err.message || JSON.stringify(err)), "error", 7000);
  } finally {
    state.scanning = false;
    document.getElementById("scan-btn").disabled = false;
    document.getElementById("empty-btn").disabled = false;
    document.getElementById("status").classList.add("hidden");
    document.getElementById("scan-btn").innerHTML = `
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      Re-scan
    `;
  }
}

function renderVisibleGroups() {
  const list = document.getElementById("groups-list");

  } else {
    list.innerHTML = rows.map(({group, index}, visibleIndex) =>
      renderGroup(group, index, visibleIndex + 1)
    ).join("");
  }
  const summary = visibleDeletionSummary();
  const totalVisibleWasted = rows.reduce((sum, {group}) => sum + group.wasted, 0);
  const cacheText = state.cacheEnabled
    ? ` · cache ${state.cacheHits}/${state.cacheHits + state.cacheMisses} hits`
    : "";

    resultCount.textContent = `${rows.length} of ${state.groups.length} groups visible · ${summary.count} files selectable`;

function renderGroup(g, gi, displayNumber = gi + 1) {
  const wasted = g.wasted;
  const protectedLabel = g.protected_count ? ` · ${g.protected_count} protected` : "";
  return `
    <div class="group open" id="group-${gi}">
      <div class="group-head" onclick="toggleGroup(${gi})">
        <div class="group-title">
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg>

        </div>
      </div>
      <div class="group-body">
        ${g.anchor ? `<div class="anchor-hint">under: ${escapeHtml(g.anchor)}</div>` : ""}
        ${g.files.map((f, fi) => renderFile(g, gi, fi)).join("")}
      </div>
    </div>
  `;
}

function renderFile(g, gi, fi) {
  const file = g.files[fi];
  const isKeep = g.keepIndex === fi;
  const isProtected = !!file.protected;
  const status = isProtected ? "LOCK" : (isKeep ? "KEEP" : "DEL");
  const rowClass = isProtected ? "protected" : (isKeep ? "keep" : "delete");
  const title = isProtected
    ? "Protected folder: this file will not be deleted"
    : (isKeep ? "Kept" : "Click to keep this copy instead");
  return `
    <div class="file ${rowClass}" onclick="setKeep(${gi}, ${fi})" title="${title}">
      <div class="file-status">${status}</div>
      <div class="file-info">
        <div class="file-name">${escapeHtml(file.short)}</div>
        <div class="file-meta">${formatSize(g.size)} · modified ${file.mtime}${isProtected ? " · protected" : ""}</div>
      </div>

      <button class="open-btn" data-path="${escapeHtml(file.path)}" title="Open in Explorer">${OPEN_BTN_SVG}</button>
    </div>
  `;
}

// ============================================================================
// Policies
// ============================================================================
function chooseByPolicy(g, policy) {
  const protectedIndexes = g.files
    .map((f, i) => f.protected ? i : -1)
    .filter(i => i >= 0);
  const candidates = protectedIndexes.length ? protectedIndexes : g.files.map((_, i) => i);
  if (policy === "keep-newest") {
    return candidates.reduce((best, i) => g.files[i].mtime_ts > g.files[best].mtime_ts ? i : best, candidates[0]);
  }
  if (policy === "keep-oldest") {
    return candidates.reduce((best, i) => g.files[i].mtime_ts < g.files[best].mtime_ts ? i : best, candidates[0]);
  }
  if (policy === "keep-shortest") {
    return candidates.reduce((best, i) => g.files[i].short.length < g.files[best].short.length ? i : best, candidates[0]);
  }
  return candidates[0];
}

function applyPolicy() {
  const policy = document.getElementById("policy").value;
  state.defaultPolicy = policy;
  const defaultPolicyEl = document.getElementById("default-policy");
  if (defaultPolicyEl) defaultPolicyEl.value = policy;
  const rows = visibleGroups();
  for (const {group} of rows) {
    group.keepIndex = chooseByPolicy(group, policy);
  }
  renderVisibleGroups();
  toast(`Applied to ${rows.length} visible group(s).`, "success", 2500);
}

// Action bar / execute
// ============================================================================
function updateActionBar() {
  const bar = document.getElementById("action-bar");
  const rows = visibleGroups();
  if (!state.groups.length || !rows.length) { bar.classList.add("hidden"); return; }
  const {count, bytes} = visibleDeletionSummary();
  document.getElementById("will-count").textContent = count;
  document.getElementById("will-free").textContent = formatSize(bytes);
  const executeBtn = document.getElementById("execute-btn");
  if (executeBtn) executeBtn.disabled = count === 0;
  bar.classList.remove("hidden");
}

function onPermanentToggle() {
  const perm = document.getElementById("permanent").checked;
  document.getElementById("action-verb").textContent = perm ? "permanently delete" : "quarantine";
  const btn = document.getElementById("execute-btn");
  btn.textContent = perm ? "Permanently delete" : "Move to quarantine";
  btn.className = "btn " + (perm ? "btn-danger" : "btn-primary");
}

async function execute() {
  const perm = document.getElementById("permanent").checked;
  const deletions = [];
  const rows = visibleGroups();
  for (const {group} of rows) {
    for (const {file} of selectedDeletionsIn(group)) {
      deletions.push({
        path: file.path,
        size: group.size,
        mtime_ts: file.mtime_ts,
        sha256: file.sha256,
      });
    }
  }
  if (!deletions.length) { toast("Nothing is marked for deletion.", "warning"); return; }
  const sizeStr = formatSize(deletions.reduce((s, d) => s + d.size, 0));
  const ok = await confirmModal({
    title: perm ? "Permanently delete files?" : "Move files to quarantine?",
    body: perm
      ? `${deletions.length} visible file(s) totalling ${sizeStr} will be unlinked. <strong style="color:var(--danger)">This cannot be undone.</strong>`
      : `${deletions.length} visible file(s) totalling ${sizeStr} will be moved to <code>.dupfinder_quarantine/</code>. You can restore them later.`,
    confirmText: perm ? "Delete forever" : "Move to quarantine",
    danger: perm,
  });
  if (!ok) return;

  document.getElementById("execute-btn").disabled = true;
  try {
    const res = await api("/api/execute", {
      permanent: perm,
      deletions,
      protected_paths: protectedPaths(),
    });
    if (res.mode === "quarantine") {
      toast(`Quarantined ${res.count} file(s), freed ${formatSize(res.freed)}.`, "success", 6000);
      if (res.manifest_path) {
        const m = res.manifest_path;
        toast(`Manifest: ${m}`, "info", 8000);
      }
    } else {
      toast(`Deleted ${res.count} file(s), freed ${formatSize(res.freed)}.`, "success", 6000);
    }
    if (res.errors && res.errors.length) {
      toast(`${res.errors.length} error(s) occurred — check console.`, "error", 7000);
      console.warn(res.errors);
    }
    // Clear state and prompt re-scan.
    state.groups = []; state.totalWasted = 0; state.totalRecoverable = 0; state.totalGroups = 0;
    document.getElementById("results").innerHTML = "";
    document.getElementById("action-bar").classList.add("hidden");
  } catch (err) {
    toast("Execute failed: " + (err.error || JSON.stringify(err)), "error", 7000);
  } finally {
    document.getElementById("execute-btn").disabled = false;
  }
}

    if (document.getElementById("similar-btn")) document.getElementById("similar-btn").disabled = false;
    document.getElementById("status").classList.add("hidden");
  }
}

function renderLargestResults() {
  const wrap = document.getElementById("largest-results");
  wrap.classList.remove("hidden");
  wrap.classList.add("fade-in");

  if (!state.largestFiles.length && !state.largestFolders.length) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📭</div>
        <h3>Nothing found</h3>
        <p>The selected folders appear to be empty.</p>
      </div>
    `;
    return;
  }

  const totalLabel = formatSize(state.largestTotalBytes);
  let html = `
    <div class="card hero">
      <div class="hero-left">
        <div class="label">Disk usage</div>
        <div class="big">${state.largestTotalFiles.toLocaleString()} <span style="font-weight:500;color:var(--text-dim);font-size:18px;">files</span></div>
        <div class="sub">${totalLabel} total across scanned folders</div>
      </div>
    </div>
  `;

  if (state.largestFolders.length) {
    html += `
      <div class="card" style="padding:0;">
        <div style="padding:14px 18px;border-bottom:1px solid var(--border);">
          <div class="card-title" style="margin-bottom:2px;">Largest folders</div>
          <div style="font-size:13px;color:var(--text-dim);">Top ${state.largestFolders.length} by recursive size</div>
        </div>
        ${state.largestFolders.map((f, i) => `
          <div class="efolder" style="cursor:default;">
            <div style="width:56px;font-family:'Cascadia Code',Consolas,monospace;font-size:12.5px;color:var(--accent);text-align:right;flex-shrink:0;">${escapeHtml(f.total_size_label)}</div>
            <div class="efolder-path">${escapeHtml(f.short || f.path)}
              <div style="font-size:11.5px;color:var(--text-faint);font-family:inherit;margin-top:2px;">${f.file_count.toLocaleString()} file(s)${f.direct_size > 0 ? ` · ${formatSize(f.direct_size)} directly here` : ""}</div>
            </div>
            <button class="open-btn" data-path="${escapeHtml(f.path)}" title="Open in Explorer">${OPEN_BTN_SVG}</button>
          </div>
        `).join("")}
      </div>
    `;
  }

  if (state.largestFiles.length) {
    html += `
      <div class="card" style="padding:0;">
        <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div class="card-title" style="margin-bottom:2px;">Largest files</div>
            <div style="font-size:13px;color:var(--text-dim);">Top ${state.largestFiles.length} by size</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn" onclick="toggleAllLargest(true)">Select all</button>
            <button class="btn" onclick="toggleAllLargest(false)">Clear</button>
          </div>
        </div>
        ${state.largestFiles.map((f, i) => `
          <label class="efolder ${f.selected ? "" : "unselected"}" id="lf-${i}">
            <input type="checkbox" ${f.selected ? "checked" : ""} onchange="toggleLargestFile(${i})" />
            <div style="width:56px;font-family:'Cascadia Code',Consolas,monospace;font-size:12.5px;color:var(--accent);text-align:right;flex-shrink:0;">${escapeHtml(f.size_label)}</div>
            <span class="efolder-path">${escapeHtml(f.short || f.path)}
              <div style="font-size:11.5px;color:var(--text-faint);font-family:inherit;margin-top:2px;">modified ${escapeHtml(f.mtime)}</div>
            </span>
            <button class="preview-btn" data-path="${escapeHtml(f.path)}" title="Preview">${PREVIEW_BTN_SVG}</button>
            <button class="open-btn" data-path="${escapeHtml(f.path)}" title="Open in Explorer">${OPEN_BTN_SVG}</button>
          </label>
        `).join("")}
        <div class="efolder-foot">
          <div class="meta"><span id="lf-selected">0</span> file(s) selected · <span id="lf-bytes">0 B</span></div>
          <button id="lf-delete-btn" class="btn btn-danger" onclick="deleteSelectedLargest()" disabled>Move to quarantine</button>
        </div>
      </div>
    `;
  }

  wrap.innerHTML = html;
  updateLargestSelectedCount();
}

function toggleLargestFile(i) {
  state.largestFiles[i].selected = !state.largestFiles[i].selected;
  const el = document.getElementById(`lf-${i}`);
  if (el) el.classList.toggle("unselected", !state.largestFiles[i].selected);
  updateLargestSelectedCount();
}

function toggleAllLargest(value) {
  for (const f of state.largestFiles) f.selected = value;
  renderLargestResults();
}

function updateLargestSelectedCount() {
  const sel = state.largestFiles.filter(f => f.selected);
  const n = sel.length;
  const bytes = sel.reduce((s, f) => s + f.size, 0);
  const cnt = document.getElementById("lf-selected");
  const bts = document.getElementById("lf-bytes");
  const btn = document.getElementById("lf-delete-btn");
  if (cnt) cnt.textContent = n;
  if (bts) bts.textContent = formatSize(bytes);
  if (btn) btn.disabled = n === 0;
}

async function deleteSelectedLargest() {
  const targets = state.largestFiles.filter(f => f.selected);
  if (!targets.length) return;
  const bytes = targets.reduce((s, f) => s + f.size, 0);
  const ok = await confirmModal({
    title: `Move ${targets.length} file(s) to quarantine?`,
    body: `Total ${formatSize(bytes)} will be moved to <code>.dupfinder_quarantine/</code>. Restorable later via Restore.`,
    confirmText: "Move to quarantine",
    danger: false,
  });
  if (!ok) return;
  try {
    const res = await api("/api/execute", {
      permanent: false,
      deletions: targets.map(f => ({
        path: f.path,
        size: f.size,
        mtime_ts: f.mtime_ts,
      })),
    });
    if (res.errors && res.errors.length) {
      toast(`Quarantined ${res.count}, ${res.errors.length} error(s) — see console.`, "warning", 6000);
      console.warn(res.errors);
    } else {
      toast(`Quarantined ${res.count} file(s), freed ${formatSize(res.freed)}.`, "success", 5000);
    }
    // Remove succeeded ones from view (best-effort: just remove all selected).
    state.largestFiles = state.largestFiles.filter(f => !f.selected);
    renderLargestResults();
  } catch (err) {
    toast("Delete failed: " + (err.error || JSON.stringify(err)), "error", 7000);
  }
}

// ============================================================================
// Similar photos
// ============================================================================
async function startScanSimilar() {
  const scanFolders = activeFolders();
  if (!scanFolders.length) {
    toast("Add or enable at least one folder first.", "warning");
    return;
  }
  if (state.scanning) return;
  state.scanning = true;

  const minSize = Number(document.getElementById("min-size").value) || 1;
  const skipRaw = document.getElementById("skip").value || "";
  const skip = skipRaw.split(",").map(s => s.trim()).filter(Boolean);

  document.getElementById("scan-btn").disabled = true;
  document.getElementById("similar-btn").disabled = true;
  document.getElementById("empty-btn").disabled = true;
  document.getElementById("largest-btn").disabled = true;
  resetCancelBtn();
  document.getElementById("status").classList.remove("hidden");
  document.getElementById("status-text").textContent = "Hashing photos and finding similar ones...";
  document.getElementById("similar-results").classList.add("hidden");

  try {
    const job = await api("/api/scan_similar_start", {
      paths: scanFolders.map(f => f.path),
      skip,
      min_size: minSize,
      threshold: state.similarThreshold,
    });
    if (job.pillow_available === false) {
      toast("Pillow not installed. Run: pip install Pillow", "error", 9000);
      return;
    }
    const data = await waitForScan(job.job_id);
    if (data.cancelled) {
      toast("Scan cancelled.", "warning", 3000);
    } else if (data.pillow_available === false) {
      toast("Pillow not installed. Run: pip install Pillow", "error", 9000);
    } else {
      state.similarGroups = (data.groups || []).map(g => ({
        ...g,
        files: g.files.map((f, i) => ({...f, keep: g.keep_indices.includes(i)})),
      }));
      state.similarScanned = data.scanned || 0;
      state.similarSkipped = data.skipped || 0;
      state.similarThreshold = data.threshold || state.similarThreshold;
      renderSimilarResults();
    }
  } catch (err) {
    toast("Scan failed: " + (err.error || err.message || JSON.stringify(err)), "error", 7000);
  } finally {
    state.scanning = false;
    document.getElementById("scan-btn").disabled = false;
    document.getElementById("similar-btn").disabled = false;
    document.getElementById("empty-btn").disabled = false;
    document.getElementById("largest-btn").disabled = false;
    document.getElementById("status").classList.add("hidden");
  }
}

function renderSimilarResults() {
  const wrap = document.getElementById("similar-results");
  wrap.classList.remove("hidden");
  wrap.classList.add("fade-in");

  if (!state.similarGroups.length) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📸</div>
        <h3>No similar photos found</h3>
        <p>Scanned ${state.similarScanned} image(s)${state.similarSkipped ? `, skipped ${state.similarSkipped}` : ""}.
        Try increasing the threshold below to be more inclusive.</p>
      </div>
      <div class="sim-controls">
        <label>Similarity threshold:</label>
        <input type="range" id="sim-threshold" min="0" max="15" step="1" value="${state.similarThreshold}" oninput="onThresholdChange(this.value)" />
        <span id="sim-threshold-val" style="font-family:'Cascadia Code',Consolas,monospace;">${state.similarThreshold}</span>
        <button class="btn" onclick="startScanSimilar()">Re-scan</button>
      </div>
    `;
    return;
  }

  const totalWaste = state.similarGroups.reduce(
    (s, g) => s + g.files.filter(f => !f.keep).reduce((x, f) => x + f.size, 0), 0
  );
  const totalDel = state.similarGroups.reduce(
    (s, g) => s + g.files.filter(f => !f.keep).length, 0
  );

  let html = `
    <div class="card hero">
      <div class="hero-left">
        <div class="label">Similar photo groups</div>
        <div class="big">${state.similarGroups.length} <span style="font-weight:500;color:var(--text-dim);font-size:18px;">groups</span></div>
        <div class="sub">${state.similarScanned} image(s) scanned${state.similarSkipped ? `, ${state.similarSkipped} skipped` : ""} · threshold ${state.similarThreshold}</div>
      </div>
      <div class="hero-right">
        <button class="btn" onclick="similarApplyDefault()">Reset to default keepers</button>
      </div>
    </div>
    <div class="sim-controls">
      <label>Threshold (0 = identical, 15 = loose):</label>
      <input type="range" id="sim-threshold" min="0" max="15" step="1" value="${state.similarThreshold}" oninput="onThresholdChange(this.value)" />
      <span id="sim-threshold-val" style="font-family:'Cascadia Code',Consolas,monospace;min-width:20px;text-align:right;">${state.similarThreshold}</span>
      <button class="btn" onclick="startScanSimilar()">Re-scan</button>
    </div>
  `;

  state.similarGroups.forEach((g, gi) => {
    const groupDel = g.files.filter(f => !f.keep);
    const groupWaste = groupDel.reduce((s, f) => s + f.size, 0);
    html += `
      <div class="sim-group" id="sim-group-${gi}">
        <div class="sim-group-head">
          <div>
            <strong>Group ${gi + 1}</strong>
            <span class="meta"> · ${g.count} photos</span>
          </div>
          <div class="meta"><span id="sim-group-${gi}-waste">${formatSize(groupWaste)}</span> in non-keepers</div>
        </div>
        <div class="sim-grid">
          ${g.files.map((f, fi) => renderSimTile(gi, fi, f)).join("")}
        </div>
        <div class="sim-group-foot">
          <div class="meta">Click a photo to keep it. Default keeper is the largest file.</div>
          <button class="btn" onclick="similarSelectAllInGroup(${gi})">Keep all</button>
        </div>
      </div>
    `;
  });

  html += `
    <div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;">
      <div>
        <div class="label" style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);">Marked for deletion</div>
        <div style="font-size:18px;font-weight:600;margin-top:2px;"><span id="sim-total-count">${totalDel}</span> photo(s) · <span id="sim-total-bytes">${formatSize(totalWaste)}</span></div>
      </div>
      <button id="sim-delete-btn" class="btn btn-danger" onclick="deleteSelectedSimilar()" ${totalDel === 0 ? "disabled" : ""}>Move marked photos to quarantine</button>
    </div>
  `;

  wrap.innerHTML = html;
}

function renderSimTile(gi, fi, f) {
  const cls = f.keep ? "keep" : "delete";
  const label = f.keep ? "KEEP" : "DEL";
  return `
    <div class="sim-tile ${cls}" onclick="toggleSimKeep(${gi}, ${fi})" id="sim-tile-${gi}-${fi}" title="Click to ${f.keep ? "remove from keepers" : "make this the keeper"}">
      <div class="sim-tile-actions">
        <button class="preview-btn" data-path="${escapeHtml(f.path)}" title="Preview full size">${PREVIEW_BTN_SVG}</button>
        <button class="open-btn" data-path="${escapeHtml(f.path)}" title="Open in Explorer">${OPEN_BTN_SVG}</button>
      </div>
      <span class="sim-tile-label">${label}</span>
      ${f.thumbnail ? `<img src="${f.thumbnail}" alt="" loading="lazy" />` : `<div style="height:140px;display:flex;align-items:center;justify-content:center;color:var(--text-faint);">(no preview)</div>`}
      <div class="sim-tile-meta">
        <div class="name">${escapeHtml(f.short || f.path.split(/[\\\\/]/).pop())}</div>
        <div>${escapeHtml(f.size_label)} · ${escapeHtml(f.resolution)}</div>
      </div>
    </div>
  `;
}

function toggleSimKeep(gi, fi) {
  const g = state.similarGroups[gi];
  g.files[fi].keep = !g.files[fi].keep;
  // Replace tile element in place for snappy feedback.
  const el = document.getElementById(`sim-tile-${gi}-${fi}`);
  if (el) el.outerHTML = renderSimTile(gi, fi, g.files[fi]);
  updateSimilarTotals();
}

function similarSelectAllInGroup(gi) {
  for (const f of state.similarGroups[gi].files) f.keep = true;
  renderSimilarResults();
}

function similarApplyDefault() {
  // Largest file (index 0 since backend sorted by size desc) = keep, rest delete.
  for (const g of state.similarGroups) {
    g.files.forEach((f, i) => { f.keep = (i === 0); });
  }
  renderSimilarResults();
}

function updateSimilarTotals() {
  let total = 0, bytes = 0;
  for (const g of state.similarGroups) {
    const del = g.files.filter(f => !f.keep);
    total += del.length;
    bytes += del.reduce((s, f) => s + f.size, 0);
    const wasteEl = document.getElementById(`sim-group-${state.similarGroups.indexOf(g)}-waste`);
    if (wasteEl) wasteEl.textContent = formatSize(del.reduce((s, f) => s + f.size, 0));
  }
  const cnt = document.getElementById("sim-total-count");
  const bts = document.getElementById("sim-total-bytes");
  const btn = document.getElementById("sim-delete-btn");
  if (cnt) cnt.textContent = total;
  if (bts) bts.textContent = formatSize(bytes);
  if (btn) btn.disabled = total === 0;
}

function onThresholdChange(v) {
  state.similarThreshold = Number(v);
  const lbl = document.getElementById("sim-threshold-val");
  if (lbl) lbl.textContent = v;
}

async function deleteSelectedSimilar() {
  const targets = [];
  for (const g of state.similarGroups) {
    for (const f of g.files) {
      if (!f.keep) targets.push({path: f.path, size: f.size, mtime_ts: f.mtime_ts});
    }
  }
  if (!targets.length) return;
  const bytes = targets.reduce((s, t) => s + t.size, 0);
  const ok = await confirmModal({
    title: `Move ${targets.length} photo(s) to quarantine?`,
    body: `Total ${formatSize(bytes)} will be moved. Restorable later via Restore.<br>The keeper of each group stays untouched.`,
    confirmText: "Move to quarantine",
    danger: false,
  });
  if (!ok) return;
  try {
    const res = await api("/api/execute", {
      permanent: false,
      deletions: targets,
    });
    if (res.errors && res.errors.length) {
      toast(`Quarantined ${res.count}, ${res.errors.length} error(s) — see console.`, "warning", 6000);
      console.warn(res.errors);
    } else {
      toast(`Quarantined ${res.count} photo(s), freed ${formatSize(res.freed)}.`, "success", 5000);
    }
    // Remove deleted from view; drop groups that now have ≤ 1 photo.
    for (const g of state.similarGroups) {
      g.files = g.files.filter(f => f.keep);
    }
    state.similarGroups = state.similarGroups.filter(g => g.files.length > 1);
    renderSimilarResults();
  } catch (err) {
    toast("Delete failed: " + (err.error || JSON.stringify(err)), "error", 7000);
  }
}

// ============================================================================
// Restore
// ============================================================================
function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
}

function formatHistoryDate(value) {
  if (!value) return "Unknown time";
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return value;
  return d.toLocaleString();
}

async function openRestore() {
  let pick;
  try { pick = await api("/api/browse_manifest"); }
  catch { toast("Could not open file picker.", "error"); return; }
  if (!pick.path) return;
  await restoreManifest(pick.path);
}

async function restoreManifest(manifestPath) {
  const ok = await confirmModal({
    title: "Restore files?",
    body: `Files listed in <code>${escapeHtml(manifestPath)}</code> will be moved back to their original paths. Anything occupying those paths will be skipped (never overwritten).`,
    confirmText: "Restore",
  });
  if (!ok) return;
  try {
    const r = await api("/api/restore", {manifest_path: manifestPath});
    if (r.return_code === 0) toast("Restore completed.", "success");
    else toast("Restore finished with some errors — check console.", "warning");
    closeModal();
  } catch (err) {
    toast("Restore failed: " + (err.error || JSON.stringify(err)), "error");
  }
}

async function openPreview(path) {
  const root = document.getElementById("modal-root");
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal wide">
        <h3>Preview</h3>
        <p>${escapeHtml(path)}</p>
        <div class="preview-meta"><div>Loading...</div></div>
        <div class="modal-actions">
          <button class="btn ghost" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>
  `;
  try {
    const data = await api("/api/preview", {path});
    renderPreview(data);
  } catch (err) {
    renderPreview({
      kind: "error",
      path,
      error: err.error || JSON.stringify(err),
    });
  }
}

function renderPreview(data) {
  const root = document.getElementById("modal-root");
  const safePath = escapeHtml(data.path || "");
  const title = escapeHtml(data.name || "Preview");
  let body = "";
  const meta = `
    <div class="preview-meta">
      <div><strong>Path:</strong> ${safePath}</div>
      ${data.size_label ? `<div><strong>Size:</strong> ${escapeHtml(data.size_label)}</div>` : ""}
      ${data.mtime ? `<div><strong>Modified:</strong> ${escapeHtml(data.mtime)}</div>` : ""}
      ${data.mime ? `<div><strong>Type:</strong> ${escapeHtml(data.mime)}</div>` : ""}
    </div>
  `;

  if (data.kind === "image") {
    body = `${meta}<img class="preview-img" src="${data.data_url}" alt="${title}" />`;
  } else if (data.kind === "text") {
    const truncated = data.truncated ? `<p>Showing the first part of this file.</p>` : "";
    body = `${meta}${truncated}<pre class="preview-text">${escapeHtml(data.text || "")}</pre>`;
  } else if (data.kind === "error") {
    body = `<div class="preview-meta"><div><strong>Error:</strong> ${escapeHtml(data.error || "Preview failed.")}</div><div>${safePath}</div></div>`;
  } else {
    body = `${meta}<p>${escapeHtml(data.note || "No inline preview for this file type.")}</p>`;
  }

  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal wide">
        <h3>${title}</h3>
        ${body}
        <div class="modal-actions">
          <button class="btn ghost" onclick="closeModal()">Close</button>
          ${data.path ? `<button class="btn preview-open-location" data-path="${escapeHtml(data.path)}">Open Location</button>` : ""}
        </div>
      </div>
    </div>
  `;
}

async function openHistory() {
  let data;
  try {
    data = await api("/api/quarantine_history");
  } catch (err) {
    toast("Could not load history: " + (err.error || JSON.stringify(err)), "error");
    return;
  }
  const runs = data.runs || [];
  const rows = runs.length ? runs.map(run => `
    <div class="history-row">
      <div class="history-main">
        <div class="history-title">${formatHistoryDate(run.created_utc)} · ${run.file_count} file(s) · ${formatSize(run.total_bytes)}</div>
        <div class="history-meta">${run.available_count} available · ${run.restored_or_missing_count} restored/missing</div>
        <div class="history-meta">${escapeHtml(run.manifest_path)}</div>
      </div>
      <div class="history-actions">
        <button class="btn history-restore-btn" data-manifest="${escapeHtml(run.manifest_path)}">Restore</button>
        <button class="open-btn" data-path="${escapeHtml(run.quarantine_dir)}" title="Open quarantine folder">${OPEN_BTN_SVG}</button>
      </div>
    </div>
  `).join("") : `<div class="empty-line" style="padding:18px;">No quarantine history yet.</div>`;

  const root = document.getElementById("modal-root");
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal wide">
        <h3>Quarantine History</h3>
        <p>Previous safe cleanup runs are listed here. Restores never overwrite files already back at their original path.</p>
        <div class="history-list">${rows}</div>
        <div class="modal-actions">
          <button class="btn ghost" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>
  `;
}

// ============================================================================
// Init
// ============================================================================
state.profiles = readProfiles();
renderProfileSelect();
renderFolders();
onPermanentToggle();
</script>
